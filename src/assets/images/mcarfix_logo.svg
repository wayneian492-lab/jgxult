<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- White background inside the rounded triangle -->
  <!-- We draw the rounded triangle with a thick orange border and white fill -->
  <path d="M 250,55 
           C 280,55 440,320 455,345 
           C 470,370 450,420 410,420 
           L 90,420 
           C 50,420 30,370 45,345 
           C 60,320 220,55 250,55 Z" 
        fill="#ffffff" 
        stroke="#f17a1a" 
        stroke-width="36" 
        stroke-linejoin="round" />

  <!-- Car Silhouette (Orange) on the Left -->
  <g transform="translate(135, 110) scale(0.95)">
    <!-- Left Mirror -->
    <path d="M 12,70 C 4,70 1,77 4,83 C 7,87 14,87 16,81 Z" fill="#f17a1a" />
    
    <!-- Main Car Body Front View -->
    <path d="M 40,42 
             C 50,15 75,10 110,10 
             C 145,10 170,15 180,42 
             C 183,50 188,54 195,57 
             C 202,60 205,70 205,82 
             L 202,120 
             C 202,127 196,130 190,130 
             L 30,130 
             C 24,130 18,127 18,120 
             L 15,82 
             C 15,70 18,60 25,57 
             C 32,54 37,50 40,42 Z" 
          fill="#f17a1a" />
    
    <!-- Windshield (White) -->
    <path d="M 48,44 
             C 55,25 75,20 110,20 
             C 145,20 165,25 172,44 
             L 179,64 
             L 41,64 Z" 
          fill="#ffffff" />
    
    <!-- Headlight on the Left (White with Orange Center) -->
    <path d="M 24,80 
             C 24,70 44,70 50,80 
             C 52,87 45,97 28,97 
             C 25,97 24,92 24,80 Z" 
          fill="#ffffff" />
    
    <path d="M 28,80 
             C 28,74 40,74 44,80 
             C 45,85 40,92 31,92 
             C 29,92 28,88 28,80 Z" 
          fill="#f17a1a" />
          
    <!-- Grille/Bumper lines (White) -->
    <rect x="65" y="78" width="115" height="10" rx="3" fill="#ffffff" />
    <rect x="65" y="94" width="115" height="6" rx="2" fill="#ffffff" />
  </g>

  <!-- Wrench (Dark Blue) on the Right, overlapping the car -->
  <g fill="#0e3e5d">
    <!-- Wrench Top Jaw (Open End) -->
    <path d="M 280,100 
             C 261,100 246,115 246,134 
             C 246,147 254,158 266,164 
             L 268,180 
             L 292,180 
             L 294,164 
             C 306,158 314,147 314,134 
             C 314,115 299,100 280,100 Z" />
             
    <!-- Open end U-cutout rotated -15 deg, colored white to override -->
    <g transform="translate(280, 134) rotate(-15) translate(-280, -134)">
      <path d="M 268,90 
               L 268,134 
               C 268,141 273,146 280,146 
               C 287,146 292,141 292,134 
               L 292,90 Z" 
            fill="#ffffff" />
    </g>
             
    <!-- Wrench Handle -->
    <path d="M 268,175 L 292,175 L 292,270 L 268,270 Z" />
    
    <!-- Ring End (Bottom Box End) -->
    <path d="M 280,270 
             C 263,270 250,283 250,300 
             C 250,317 263,330 280,330 
             C 297,330 310,317 310,300 
             C 310,283 297,270 280,270 Z" />
             
    <!-- Hexagonal hole (white) in the ring end -->
    <polygon points="280,285 293,292.5 293,307.5 280,315 267,307.5 267,292.5" fill="#ffffff" />
  </g>

  <!-- Typography: mCarFix (Center) -->
  <text x="250" y="375" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="44" text-anchor="middle" letter-spacing="-1.5">
    <tspan fill="#0e3e5d">m</tspan>
    <tspan fill="#f17a1a">Car</tspan>
    <tspan fill="#0e3e5d">Fix</tspan>
    <tspan fill="#f17a1a" font-size="16" font-weight="bold" dy="-18">®</tspan>
  </text>

  <!-- Divider Line & "Take Charge" -->
  <!-- Left Segment -->
  <line x1="100" y1="398" x2="200" y2="398" stroke="#f17a1a" stroke-width="2.5" />
  
  <!-- "Take Charge" Text -->
  <text x="250" y="402" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="11" fill="#0e3e5d" text-anchor="middle" letter-spacing="0.5">Take Charge</text>
  
  <!-- Right Segment -->
  <line x1="300" y1="398" x2="400" y2="398" stroke="#f17a1a" stroke-width="2.5" />
</svg>
